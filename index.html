<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V2Ray6 - Cybernetic Flow</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* التنسيق الاحترافي المستقبلي */
        body { background-color: #0a0a0a; color: #e0e0e0; font-family: 'Cairo', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .header { width: 100%; background: linear-gradient(135deg, #1a1a1a, #0a0a0a); padding: 30px; text-align: center; border-bottom: 2px solid #00e0ff; box-shadow: 0 5px 20px rgba(0,224,255,0.2); margin-bottom: 30px; }
        .header h1 { font-family: 'Orbitron', sans-serif; color: #00e0ff; text-shadow: 0 0 15px rgba(0,224,255,0.6); margin: 0; font-size: 2.2rem; }
        .main-container { width: 95%; max-width: 900px; background: #1a1a1a; padding: 25px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 40px rgba(0,0,0,0.8); position: relative; }
        
        /* منطقة الإعلان وقفل المحتوى */
        .unlock-box { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 350px; text-align: center; border: 2px dashed #00e0ff; border-radius: 15px; background: rgba(0, 224, 255, 0.03); }
        .btn-unlock { background: #00aaff; color: white; padding: 18px 40px; border-radius: 10px; font-size: 1.3rem; text-decoration: none; font-weight: bold; transition: 0.4s; box-shadow: 0 0 20px rgba(0,170,255,0.3); border: none; cursor: pointer; }
        .btn-unlock:hover { background: #00d2ff; transform: scale(1.05); box-shadow: 0 0 30px rgba(0,210,255,0.5); }
        
        /* العداد التنازلي */
        #status-msg { margin-top: 25px; font-family: 'Orbitron', sans-serif; color: #00ff80; display: none; font-size: 1.1rem; }
        #timer-num { font-size: 1.5rem; font-weight: bold; color: #fff; }

        /* مشغل Gumlet */
        #player-wrapper { display: none; width: 100%; position: relative; padding-top: 56.25%; /* نسبة 16:9 */ }
        #player-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 15px; border: none; }
        
        .footer { margin-top: 40px; color: #555; font-size: 0.9rem; padding-bottom: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>V2Ray6 - Cybernetic Flow</h1>
        <p style="color: #888; margin-top: 10px;">دورة التعليم المتقدم عبر Gumlet & GitHub</p>
    </div>

    <div class="main-container">
        <div id="unlock-area" class="unlock-box">
            <p style="font-size: 1.1rem; margin-bottom: 25px; color: #ccc;">المحتوى مقفل! يرجى دعمنا بفتح الرابط أدناه لمشاهدة الفيديوهات:</p>
            <a href="https://omg10.com/4/10637838" target="_blank" class="btn-unlock" onclick="startCountdown()">🔓 إفتح الرابط و ابدأ المشاهدة</a>
            <div id="status-msg">سيفتح المشغل تلقائياً بعد <span id="timer-num">8</span> ثوانٍ...</div>
        </div>

        <div id="player-wrapper">
            <iframe src="https://play.gumlet.io/embed/playlist/699caea771f7bf393a69c269" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
    </div>

    <div class="footer">
        Powered by SHΔDØW CORE | V2Ray6 Project 2026
    </div>

    <script>
        function startCountdown() {
            // إظهار رسالة العداد
            document.getElementById('status-msg').style.display = 'block';
            let seconds = 8;
            
            const timerInterval = setInterval(() => {
                seconds--;
                document.getElementById('timer-num').innerText = seconds;
                
                if (seconds <= 0) {
                    clearInterval(timerInterval);
                    // إخفاء منطقة القفل وإظهار المشغل
                    document.getElementById('unlock-area').style.display = 'none';
                    document.getElementById('player-wrapper').style.display = 'block';
                }
            }, 1000);
        }
    </script>

</body>
</html>
